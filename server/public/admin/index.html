<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydroman Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-stat { transition: 0.3s; }
        .card-stat:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #app-content { display: none; }
        #login-container { max-width: 400px; margin: 100px auto; }
        .brand-text { color: #0d6efd; font-weight: bold; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-container" class="container">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="text-center mb-4"><span class="brand-text">Hydroman</span> Admin</h3>
                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" id="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                    <div id="login-error" class="text-danger mt-2 text-center" style="display:none;"></div>
                </form>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="app-content">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Hydroman Dashboard</a>
                <div class="d-flex align-items-center me-3"><span class="badge bg-success me-2">Live</span><small class="text-white-50" id="last-update">Updating...</small></div><button class="btn btn-outline-light btn-sm" id="logout-btn">Logout</button>
            </div>
        </nav>

        <div class="container mt-4">
            <!-- Stats Row -->
            <div class="row mb-4">
                <div class="col-md-3 mb-3">
                    <div class="card card-stat text-white bg-primary h-100">
                        <div class="card-body">
                            <h5 class="card-title">Total Users</h5>
                            <h2 id="stat-users">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card card-stat text-white bg-success h-100">
                        <div class="card-body">
                            <h5 class="card-title">Active Today</h5>
                            <h2 id="stat-active">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card card-stat text-white bg-info h-100">
                        <div class="card-body">
                            <h5 class="card-title">Total Water (L)</h5>
                            <h2 id="stat-water">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card card-stat text-white bg-warning h-100">
                        <div class="card-body">
                            <h5 class="card-title">Total Logs</h5>
                            <h2 id="stat-logs">0</h2>
                        </div>
                    </div>
                </div>
            </div>


            <!-- Feedback Table -->
            <div class="card shadow-sm mt-4 mb-4">
                <div class="card-header bg-white">
                    <h5 class="mb-0">User Feedback</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Date</th>
                                    <th>User</th>
                                    <th>Phone</th>
                                    <th>Feedback Message</th>
                                </tr>
                            </thead>
                            <tbody id="feedback-table-body">
                                <!-- Data injected via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Users Table -->
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">All Users</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Phone</th>
                                    <th>Goal (ml)</th>
                                    <th>Total Drank (ml)</th>
                                    <th>Logs</th>
                                    <th>Joined</th>
                                </tr>
                            </thead>
                            <tbody id="users-table-body">
                                <!-- Data injected via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=1.1"></script>
</body>
</html>
